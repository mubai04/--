# 叙事物理核心对象 Schema
# 版本: "2.0"
# 对应架构图 §IV

类型: 核心对象
版本: "2.0"

对象:

  事件:
    必填:
      事件ID: { 类型: 字符串 }
      类型: { 类型: 枚举, 选项: [压制, 冲突, 爽点, 悬念, 转折, 缓冲] }
      强度: { 类型: 整数, 范围: [0, 100] }
    可选:
      参与角色: { 类型: 列表 }
      标签: { 类型: 列表 }
      时间序: { 类型: 整数 }
      触发事件ID: { 类型: 字符串 }

  角色:
    必填:
      角色ID: { 类型: 字符串 }
    可选:
      动机: { 类型: 字符串 }
      当前状态: { 类型: 字符串 }
      关系网: { 类型: 列表 }
      力量值: { 类型: 整数 }
      弧线状态: { 类型: 枚举, 选项: [起, 承, 转, 合] }

  冲突:
    必填:
      冲突ID: { 类型: 字符串 }
      类型: { 类型: 字符串 }
      强度: { 类型: 整数, 范围: [0, 100] }
    可选:
      参与方: { 类型: 列表 }
      目标: { 类型: 字符串 }
      状态: { 类型: 枚举, 选项: [活跃, 升级, 解决, 搁置] }

  世界状态:
    必填:
      阵营: { 类型: 列表 }
      资源: { 类型: 列表 }
    可选:
      地点: { 类型: 字符串 }
      时间: { 类型: 字符串 }
      不稳定度: { 类型: 浮点, 范围: [0, 1] }
      世界运行时: { 类型: 对象, 引用: 指标定义.schema.yaml }

  读者状态:
    说明: "字段名对齐 Xuke，禁止另造别名"
    必填:
      期待值: { 类型: 整数, 范围: [0, 100] }
      好奇心: { 类型: 整数, 范围: [0, 100] }
      紧张感: { 类型: 整数, 范围: [0, 100] }
      爽感储备: { 类型: 整数, 范围: [0, 100] }
      疲劳值: { 类型: 整数, 范围: [0, 100] }
