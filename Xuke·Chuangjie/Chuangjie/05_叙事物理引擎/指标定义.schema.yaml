# 世界运行时指标 Schema
# 版本: "2.0"
# 叙事物理引擎维护的六维 + 不稳定度

类型: 世界运行时
版本: "2.0"

必填:
  世界运行时:
    压制值: { 类型: 整数, 范围: [0, 100], 符号: P }
    爽点强度: { 类型: 整数, 范围: [0, 100], 符号: SD }
    悬念值: { 类型: 整数, 范围: [0, 100], 符号: X }
    冲突强度: { 类型: 整数, 范围: [0, 100], 符号: C }
    情绪波动: { 类型: 整数, 范围: [-50, 50], 符号: E }
    章节风险: { 类型: 整数, 范围: [0, 100], 符号: R }

可选:
  世界运行时:
    不稳定度: { 类型: 浮点, 范围: [0, 1] }
    更新时间: { 类型: 字符串 }
    章节ID: { 类型: 字符串 }

系数默认值:
  压制爆发:
    α1: 0.6
    α2: 0.4
  悬念:
    β: 0.3
  冲突:
    δ: 2.5
  风险权重:
    w1: 0.25
    w2: 0.30
    w3: 0.20
    w4: 0.25
