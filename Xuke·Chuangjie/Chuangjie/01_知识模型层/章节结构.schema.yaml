# 章节结构 Schema
# 版本: "1.0"

类型: 章节结构
版本: "1.0"

必填:
  章节结构:
    章节ID: { 类型: 字符串 }
    章节阶段: { 类型: 枚举, 选项: [起势, 压制, 转折, 高潮, 收束] }

    叙事四相:
      压制相: { 类型: 列表, 说明: "结构节点描述，非正文" }
      触发相: { 类型: 列表 }
      爆发相: { 类型: 列表 }
      收束相: { 类型: 列表 }

    触发经验: { 类型: 列表, 说明: "XK-* 经验ID" }
    主模式链: { 类型: 字符串, 说明: "XL-*" }

    核心冲突: { 类型: 列表 }
    角色节点: { 类型: 列表, 说明: "角色ID + 行为摘要" }

可选:
  章节结构:
    字数预算: { 类型: 整数 }
    章末钩子: { 类型: 字符串 }
    备注: { 类型: 字符串 }
