# 模拟输入 Schema
# 版本: "1.0"

类型: 模拟输入
版本: "1.0"

必填:
  模拟输入:
    仿真ID: { 类型: 字符串, 格式: "SIM-{章节ID}-{轮次}" }
    运行模式: { 类型: 枚举, 选项: [预演, 复盘, 联调] }

    来源策略:
      协议版本: { 类型: 字符串 }
      主模式链: { 类型: 字符串 }
      支撑经验: { 类型: 列表 }
      读者曲线预测:
        期待值: { 类型: 整数 }
        好奇心: { 类型: 整数 }
        紧张感: { 类型: 整数 }
        爽感储备: { 类型: 整数 }
        疲劳值: { 类型: 整数 }

    章节结构:
      章节ID: { 类型: 字符串 }
      章节阶段: { 类型: 字符串 }
      叙事四相: { 类型: 对象 }
      触发经验: { 类型: 列表 }
      核心冲突: { 类型: 列表 }

    仿真前读者状态:
      期待值: { 类型: 整数, 范围: [0, 100] }
      好奇心: { 类型: 整数 }
      紧张感: { 类型: 整数 }
      爽感储备: { 类型: 整数 }
      疲劳值: { 类型: 整数 }

可选:
  模拟输入:
    世界状态: { 类型: 对象 }
    因果链: { 类型: 列表 }
