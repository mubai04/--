# 模拟输出 Schema
# 版本: "1.0"

类型: 模拟输出
版本: "1.0"

必填:
  模拟输出:
    仿真ID: { 类型: 字符串 }
    章节ID: { 类型: 字符串 }

    仿真后读者状态:
      期待值: { 类型: 整数 }
      好奇心: { 类型: 整数 }
      紧张感: { 类型: 整数 }
      爽感储备: { 类型: 整数 }
      疲劳值: { 类型: 整数 }

    读者状态变化:
      期待值: { 类型: 整数, 说明: "变化量" }
      好奇心: { 类型: 整数 }
      紧张感: { 类型: 整数 }
      爽感储备: { 类型: 整数 }
      疲劳值: { 类型: 整数 }

    偏差分析:
      偏差分: { 类型: 整数, 范围: [0, 100] }
      各维偏差:
        期待值: 整数
        好奇心: 整数
        紧张感: 整数
        爽感储备: 整数
        疲劳值: 整数
      结论: { 类型: 枚举, 选项: [准确, 中等偏差, 策略失效] }

    风险告警: { 类型: 列表 }

    仿真结论:
      是否建议调整策略: { 类型: 布尔 }
      调整建议: { 类型: 列表 }
      是否可进入正文: { 类型: 布尔 }

  快照更新:
    # 对齐 Xuke snapshot.schema.yaml，仿真完成后自动填充

可选:
  模拟输出:
    仿真运行态: { 类型: 对象, 说明: "完整中间态，调试时展开" }
