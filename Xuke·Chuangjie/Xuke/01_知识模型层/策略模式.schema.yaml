# 策略模式 Schema
# 叙事策略级组合与决策规则

类型: 策略模式
版本: "1.0"

必填字段:
  策略ID:
    类型: 字符串
    格式: "CL-{序号}"

  名称:
    类型: 字符串

  目标:
    类型: 多行文本
    说明: 策略要达成的阅读体验目标

  触发读者状态:
    类型: 对象
    说明: 当读者状态满足条件时启用
    示例:
      爽感储备: { 最小: 60 }
      疲劳值: { 最大: 40 }

  推荐经验链:
    类型: 列表

  禁用经验:
    类型: 列表
    说明: 此状态下不应使用的经验ID

  预期效果:
    类型: 对象
    字段:
      期待值: 整数
      好奇心: 整数
      紧张感: 整数
      爽感储备: 整数
      疲劳值: 整数

可选字段:
  优先级: { 类型: 整数, 范围: [1, 10] }
  备注: { 类型: 多行文本 }
