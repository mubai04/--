# 经验链 Schema
# 多个经验原子按序组合

类型: 经验链
版本: "1.0"

必填字段:
  链ID:
    类型: 字符串
    格式: "XL-{序号}"

  名称:
    类型: 字符串

  描述:
    类型: 多行文本

  步骤:
    类型: 列表
    项结构:
      序号: 整数
      经验ID: 字符串
      说明: 字符串

  适用场景:
    类型: 列表

  反例:
    类型: 列表
    说明: 不应使用的场景

可选字段:
  版本: { 类型: 字符串, 默认: "1.0" }
  标签: { 类型: 列表 }
