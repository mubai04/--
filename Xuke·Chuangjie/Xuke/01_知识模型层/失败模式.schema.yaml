# 失败模式 Schema

类型: 失败模式
版本: "1.0"

必填字段:
  失败ID:
    类型: 字符串
    格式: "SB-{序号}"

  失败类型:
    类型: 枚举
    选项: [无聊, 节奏崩坏, 重复套路, 主角失效, 悬念泄露, 其他]

  名称:
    类型: 字符串

  原因:
    类型: 列表

  结果:
    类型: 列表
    说明: 对读者与数据的影响

  修复策略:
    类型: 列表

  关联经验:
    类型: 列表
    说明: 可缓解此失败的经验ID

可选字段:
  严重度: { 类型: 枚举, 选项: [低, 中, 高] }
  来源: { 类型: 字符串 }
  标签: { 类型: 列表 }
