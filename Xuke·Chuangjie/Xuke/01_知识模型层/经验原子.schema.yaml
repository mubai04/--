# 经验原子 Schema
# 最小可复用叙事经验单元

类型: 经验原子
版本: "1.0"

必填字段:
  经验ID:
    类型: 字符串
    格式: "XK-{类别}-{序号}"
    说明: 全局唯一标识

  名称:
    类型: 字符串
    说明: 简短命名，10 字以内为宜

  类别:
    类型: 枚举
    选项: [爽点, 悬念, 压力, 反转, 升级, 情绪, 高潮, 结局, 通用]

  描述:
    类型: 多行文本
    说明: 经验的核心规律，一句话概括

  前置条件:
    类型: 列表
    说明: 生效前必须满足的状态或结构

  触发条件:
    类型: 列表
    说明: 什么情况下应使用此经验

  结果:
    类型: 列表
    说明: 正确应用后的叙事效果

  读者心理效果:
    类型: 对象
    字段:
      期待值: { 类型: 整数, 范围: [-100, 100], 说明: "变化量，非绝对值" }
      好奇心: { 类型: 整数, 范围: [-100, 100] }
      紧张感: { 类型: 整数, 范围: [-100, 100] }
      爽感储备: { 类型: 整数, 范围: [-100, 100] }
      疲劳值: { 类型: 整数, 范围: [-100, 100] }

  风险:
    类型: 列表
    说明: 误用或过度使用的后果

  标签:
    类型: 列表
    说明: 检索用关键词

  来源:
    类型: 字符串
    说明: 拆书 / 编辑反馈 / 读者评论 / 自研

可选字段:
  别名:
    类型: 字符串
    说明: 外部系统兼容 ID（如 EXP_*），单条最多一个

  版本:
    类型: 字符串
    默认: "1.0"

  状态:
    类型: 枚举
    选项: [草稿, 审核中, 已发布, 已废弃]
    默认: 草稿

  关联模式:
    类型: 列表
    说明: 常用模式链 ID 或名称

  备注:
    类型: 多行文本
