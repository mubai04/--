# 读者状态 Schema
# 单时刻读者心理量化快照

类型: 读者状态
版本: "1.0"

必填字段:
  快照ID:
    类型: 字符串
    说明: 章节或评估点标识

  读者状态:
    类型: 对象
    字段:
      期待值:
        类型: 整数
        范围: [0, 100]
        说明: 读者对后续发展的预期强度
      好奇心:
        类型: 整数
        范围: [0, 100]
        说明: 对未知信息的探索欲
      紧张感:
        类型: 整数
        范围: [0, 100]
        说明: 危机感与不确定性压力
      爽感储备:
        类型: 整数
        范围: [0, 100]
        说明: 尚未释放的累积情绪势能
      疲劳值:
        类型: 整数
        范围: [0, 100]
        说明: 对重复与冗长的耐受衰减

可选字段:
  章节序号: { 类型: 整数 }
  更新时间: { 类型: 字符串 }
  备注: { 类型: 多行文本 }
