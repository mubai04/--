经验ID: "XK-XN-002"
别名: "EXP_INFO_REVEAL"
名称: "信息揭晓"
类别: 悬念
描述: "隐藏关键信息公开，推动冲突解决或升级，并触发读者认知重构。"

前置条件:
  - 至少一条悬念处于活跃状态
  - 悬念拖延已积累足够期待（参见 XK-XN-001）
  - 读者耐心未耗尽（疲劳值 < 70）

触发条件:
  - 到达关键章节、事件或视角切换节点
  - 揭露信息改变局势理解
  - 揭晓后存在可观测后果

结果:
  - 冲突解决或升级到新层级
  - 读者紧张感释放，爽感抬升
  - 旧悬念关闭，可开启新悬念

读者心理效果:
  期待值: 20
  好奇心: -35
  紧张感: -15
  爽感储备: 30
  疲劳值: -10

风险:
  - 提前揭晓会降低悬念价值
  - 揭晓无后果 → 工具化
  - 与读者推测严重背离且无铺垫 → 信任崩塌

标签: [翻盘, 悬念, 揭露, 反转]
来源: 爆款小说高潮段

版本: "1.0"
状态: 已发布
关联模式: [误解崩塌链, 启动核心循环链]
