经验ID: "XK-XN-001"
别名: "EXP_SUSPENSE_DELAY"
名称: "悬念拖延"
类别: 悬念
描述: "关键信息暂时隐藏，在揭示节点到来前维持推测空间，抬升期待与好奇。"

前置条件:
  - 情节中存在至少一条关键未公开信息
  - 读者已感知「还有秘密」
  - 好奇心 > 30

触发条件:
  - 故事推进尚未到达预定揭示节点
  - 当前章需维持张力而非解答
  - 可投放辅助线索但不揭底

结果:
  - 读者期待持续抬升
  - 读者主动推测情节走向
  - 悬念债务累积（须在未来兑现）

读者心理效果:
  期待值: 20
  好奇心: 30
  紧张感: 15
  爽感储备: 5
  疲劳值: 5

风险:
  - 悬念拖延过久可能引起读者厌倦
  - 假线索过多 → 信任下降
  - 只拖不揭 → 悬念变欺骗

标签: [悬念, 期待, 信息隐藏]
来源: 悬疑与修仙类小说

版本: "1.0"
状态: 已发布
关联模式: [启动核心循环链, 误解崩塌链]
