经验ID: "XK-QX-001"
别名: "EXP_EMOTION_OUTBURST"
名称: "情绪爆发"
类别: 情绪
描述: "长期压抑后在强刺激下极端情绪外显，完成宣泄并对局面产生冲击。"

前置条件:
  - 焦点角色长期压抑、受挫或 grief 未释放
  - 相关关系或 stakes 已在读者心中建立权重
  - 至少 1 个叙事单元情感锚定

触发条件:
  - 特殊刺激或临界事件触发（背叛、牺牲、羞辱、失去）
  - 压抑阈值被突破
  - 爆发行为在角色性格边界内可解释

结果:
  - 对手或环境受到可感知影响
  - 情绪宣泄完成，读者获得共鸣峰值
  - 可为后续理性决策或反转留白

读者心理效果:
  期待值: 5
  好奇心: 10
  紧张感: 35
  爽感储备: 15
  疲劳值: 5

风险:
  - 频繁使用会削弱冲击力
  - 铺垫不足 → 读者冷漠
  - 爆发无后果 → 工具化

标签: [情绪, 冲突, 宣泄]
来源: 爆款小说情绪高潮段

版本: "1.0"
状态: 已发布
