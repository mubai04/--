经验ID: "XK-YL-001"
别名: "EXP_PRESSURE_ACCUMULATION"
名称: "压制积累"
类别: 压力
描述: "焦点角色连续受挫，压力逐步积累，爽感储备上升，为后续爆发铺路。"

前置条件:
  - 焦点角色处于相对劣势或受限状态
  - 存在可识别的压制源（对手、规则、环境）
  - 读者已建立「局面不利」的认知

触发条件:
  - 外部事件造成明显打击或限制
  - 连续 1–2 个叙事单元内无实质性逆转
  - 读者状态.爽感储备 < 60（尚未饱和）

结果:
  - 压力层级上升，潜力尚未显性释放
  - 爽感储备累积
  - 读者对「该释放了」的模糊期待形成

读者心理效果:
  期待值: 15
  好奇心: 5
  紧张感: 20
  爽感储备: 25
  疲劳值: 10

风险:
  - 压力过长可能导致读者疲劳（须衔接释放节点）
  - 压制无递进 → 读者脱敏
  - 无明确出路暗示 → 弃书

标签: [压制, 爽点铺垫, 蓄力]
来源: 爆款小说压制套路

版本: "1.0"
状态: 已发布
关联模式: [启动核心循环链]
