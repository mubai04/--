经验ID: "XK-SP-001"
别名: "EXP_FACE_SLAP_PUBLIC"
名称: "权威面前公开翻盘"
类别: 爽点
描述: "焦点角色在众目睽睽、权威或关键见证者在场时逆转局面，威望与认知同步抬升。"

前置条件:
  - 焦点角色此前被低估或处于下风
  - 权威角色、群体或关键见证者在场
  - 爽感储备 > 40

触发条件:
  - 焦点角色抓住机缘或反击窗口
  - 逆转结果可被当场观测与传播
  - 对手或质疑者的立场可被对照打脸

结果:
  - 焦点角色社会位阶或威望提升
  - 对手或质疑者威望下降
  - 爽感在公开场域集中释放

读者心理效果:
  期待值: 10
  好奇心: -5
  紧张感: -25
  爽感储备: -55
  疲劳值: -15

风险:
  - 使用频率过多可能丧失惊喜
  - 无前置压制则打脸变噪音
  - 见证者权重不足 → 爽感减半

标签: [翻盘, 爽点, 打脸, 公开场]
来源: 天地类修仙小说

版本: "1.0"
状态: 已发布
关联模式: [启动核心循环链]
