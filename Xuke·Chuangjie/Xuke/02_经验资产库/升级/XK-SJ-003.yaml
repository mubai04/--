经验ID: "XK-SJ-003"
别名: "EXP_FAILURE_REFLECTION"
名称: "挫败反思"
类别: 升级
描述: "焦点角色遭受失败后复盘策略或修炼路径，完成认知与能力的内化成长。"

前置条件:
  - 焦点角色刚遭遇可感知的挫败
  - 失败原因尚未完全解决
  - 读者对失败结果已有情绪反应

触发条件:
  - 独处反思、师长指点或复盘契机出现
  - 叙事节奏允许短暂缓冲
  - 非连续第 2 次反思（避免拖节奏）

结果:
  - 知识、策略或能力内化提升
  - 心理成熟度增加
  - 为下一次对抗建立新方法论

读者心理效果:
  期待值: 10
  好奇心: 5
  紧张感: -5
  爽感储备: 5
  疲劳值: 8

风险:
  - 频繁出现可能拖慢节奏
  - 反思无产出 → 注水感
  - 说教过长 → 读者跳过

标签: [挫败, 成长, 反思, 缓冲]
来源: 修仙升级小说

版本: "1.0"
状态: 已发布
关联模式: [弱势成长链, 启动核心循环链]
