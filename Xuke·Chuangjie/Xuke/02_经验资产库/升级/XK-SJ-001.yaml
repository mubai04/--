经验ID: "XK-SJ-001"
别名: "EXP_WEAK_TO_STRONG"
名称: "弱者成长"
类别: 升级
描述: "焦点角色从弱势地位出发，通过努力、历练或资源获取实现可感知的能力跃迁。"

前置条件:
  - 焦点角色初始处于弱势位
  - 读者已建立「需要变强」的期待
  - 存在成长路径（修炼、技能、资源、认知）

触发条件:
  - 修炼、历练或获得关键资源
  - 成长契机与当前困境相呼应
  - 读者状态.期待值 > 50

结果:
  - 能力或资源层级提升
  - 读者认同感与代入感增强
  - 为下一层级冲突建立新基准

读者心理效果:
  期待值: 15
  好奇心: 10
  紧张感: 0
  爽感储备: 20
  疲劳值: -5

风险:
  - 成长太快会失去过程感
  - 无代价升级 → 战力通胀
  - 成长与当前 stakes 不匹配 → 逻辑质疑

标签: [成长, 升级, 弱势]
来源: 经典修仙升级套路

版本: "1.0"
状态: 已发布
关联模式: [弱势成长链, 启动核心循环链]
