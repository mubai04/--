经验ID: "XK-SJ-002"
别名: "EXP_OPPORTUNITY_GAIN"
名称: "机缘触发"
类别: 升级
描述: "焦点角色在困境中意外获得资源、技能或契机，推动成长并打开后续叙事空间。"

前置条件:
  - 焦点角色处于困境或瓶颈
  - 读者期待「转机」但未明确形态
  - 世界观内存在可解释的机缘机制

触发条件:
  - 外部事件或隐藏元素被触发（秘境、遗物、贵人、巧合）
  - 获得过程有可感知门槛或代价暗示
  - 不与同期其他机缘堆叠过密

结果:
  - 能力或关键资源获得
  - 后续剧情获得可持续发展抓手
  - 紧张感阶段性缓解

读者心理效果:
  期待值: 10
  好奇心: 15
  紧张感: -10
  爽感储备: 25
  疲劳值: 0

风险:
  - 机缘过频可能削弱紧张感
  - 无前置困境 → 开挂感
  - 机缘与后续 stakes 不匹配 → 浪费

标签: [机缘, 成长, 转折]
来源: 修仙小说开挂套路

版本: "1.0"
状态: 已发布
关联模式: [弱势成长链, 启动核心循环链]
