经验ID: "XK-GC-001"
别名: "EXP_CRITICAL_BREAKTHROUGH"
名称: "绝境爆发"
类别: 高潮
描述: "焦点角色在生命或剧情极限处爆发力量，逆转局面，形成卷/段级高潮峰值。"

前置条件:
  - 焦点角色处于绝境（失败代价极高）
  - 紧张感与爽感储备均处于高位
  - 前期压制或积累已完成（参见 XK-YL-001）

触发条件:
  - 外部压力达到极限阈值
  - 爆发契机与前期铺垫形成因果闭环
  - 读者状态.爽感储备 > 60

结果:
  - 剧情反转，核心矛盾阶段性解决或升级
  - 能力或意志瞬间突破（须可解释）
  - 读者获得强爽感与高度满足

读者心理效果:
  期待值: -5
  好奇心: -10
  紧张感: -45
  爽感储备: -70
  疲劳值: -25

风险:
  - 使用频繁会削弱高潮效果
  - 无绝境铺垫 → 硬转折
  - 爆发后无缓冲 → 读者 exhaustion

标签: [爽点, 高潮, 绝境, 逆转]
来源: 爆款小说高潮段

版本: "1.0"
状态: 已发布
关联模式: [压制爆发链, 启动核心循环链]
