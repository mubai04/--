经验ID: "XK-FZ-001"
别名: "EXP_MISUNDERSTANDING"
名称: "误解加深"
类别: 反转
描述: "因信息不对称或事件推动，人物间误会升级，冲突与悬念同步抬升。"

前置条件:
  - 存在信息不对称（一方知、一方不知）
  - 人物关系本身含张力或利害冲突
  - 读者已感知「事情不是表面那样」

触发条件:
  - 事件推动导致误会升级（巧合、隐瞒、第三方挑拨）
  - 尚未到达真相揭露节点
  - 读者状态.好奇心 > 40

结果:
  - 人物冲突加深
  - 悬念层级提高
  - 为「信息揭晓」积累落差势能

读者心理效果:
  期待值: 15
  好奇心: 25
  紧张感: 20
  爽感储备: 10
  疲劳值: 10

风险:
  - 持续过久可能导致读者厌烦
  - 误会靠低级巧合 → 智商侮辱
  - 不揭真相 → 情感债烂尾

标签: [悬念, 冲突, 误解, 信息差]
来源: 情感与修仙类小说

版本: "1.0"
状态: 已发布
关联模式: [误解崩塌链, 启动核心循环链]
