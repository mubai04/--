# 经验冲突矩阵
# 版本: "1.1"
# 用途: 评估经验原子同章/邻章组合是否互斥，输出冲突严重度 0–100

类型: 经验冲突矩阵
版本: "1.1"

冲突类型枚举:
  - 节奏冲突      # 同章不可并存，须分章
  - 情绪冲突      # 情感基调互斥
  - 爽感冲突      # 爽点叠加贬值
  - 悬念冲突      # 拖与揭时序错误
  - 阶段冲突      # 叙事阶段不匹配
  - 读者状态冲突  # 与当前 S/T/F 方向相反

# ─────────────────────────────────────────
# 一、原子对原子冲突（同章禁止或降权）
# ─────────────────────────────────────────

原子冲突:

  - 原子A: "XK-YL-001"
    原子B: "XK-SP-001"
    冲突类型: 节奏冲突
    严重度: 85
    说明: "爽感储备不足时公开翻盘，打脸无效"
    解除条件: "S >= 40 且 已连续压制 >= 1 章"
    同章允许: false

  - 原子A: "XK-YL-001"
    原子B: "XK-GC-001"
    冲突类型: 节奏冲突
    严重度: 70
    说明: "压制与绝境爆发同章，蓄力不足"
    解除条件: "S >= 60 且 T >= 70"
    同章允许: false

  - 原子A: "XK-XN-001"
    原子B: "XK-XN-002"
    冲突类型: 悬念冲突
    严重度: 90
    说明: "同章既拖延又揭晓，悬念工具化"
    解除条件: "分章：上章拖延，下章揭晓"
    同章允许: false

  - 原子A: "XK-GC-001"
    原子B: "XK-SP-001"
    冲突类型: 爽感冲突
    严重度: 75
    说明: "双高峰同章，后者贬值"
    解除条件: "仅保留其一；或 GC 段末 + SP 下章开篇"
    同章允许: false

  - 原子A: "XK-SJ-002"
    原子B: "XK-GC-001"
    冲突类型: 阶段冲突
    严重度: 60
    说明: "机缘刚得立刻绝境爆发，成长无过程"
    解除条件: "中间至少 1 章 SJ-001 或 SJ-003"
    同章允许: false

  - 原子A: "XK-FZ-001"
    原子B: "XK-XN-002"
    冲突类型: 悬念冲突
    严重度: 50
    说明: "误解加深与信息揭晓同章，张力过短"
    解除条件: "误解至少维持 2 章后再揭晓"
    同章允许: false

  - 原子A: "XK-QX-001"
    原子B: "XK-SJ-003"
    冲突类型: 情绪冲突
    严重度: 55
    说明: "爆发与冷静反思同章，情绪割裂"
    解除条件: "爆发在本章，反思在下章"
    同章允许: false

  - 原子A: "XK-YL-001"
    原子B: "XK-SJ-002"
    冲突类型: 节奏冲突
    严重度: 40
    说明: "压制中突给机缘，须解释通道"
    解除条件: "压制源未阻断机缘路径"
    同章允许: true    # 可同章但须降权 0.7

  - 原子A: "XK-SJ-001"
    原子B: "XK-SP-001"
    冲突类型: 爽感冲突
    严重度: 35
    说明: "成长与翻盘同章略挤，可接受"
    解除条件: "成长为翻盘提供因果"
    同章允许: true

# ─────────────────────────────────────────
# 二、读者状态冲突（方向性）
# ─────────────────────────────────────────

读者状态冲突:

  - 经验ID: "XK-YL-001"
    冲突条件: "F > 70"
    冲突类型: 读者状态冲突
    严重度: 80
    说明: "疲劳高时继续压制，弃书风险"
    建议替代: ["XK-SP-001", "XK-SJ-003", "XK-XN-002"]

  - 经验ID: "XK-YL-001"
    冲突条件: "S > 80"
    冲突类型: 读者状态冲突
    严重度: 75
    说明: "储备已满仍压制，须释放"
    建议替代: ["XK-GC-001", "XK-SP-001"]

  - 经验ID: "XK-SP-001"
    冲突条件: "S < 30"
    冲突类型: 读者状态冲突
    严重度: 85
    说明: "无蓄力打脸，爽感减半"
    建议替代: ["XK-YL-001", "XK-SJ-001"]

  - 经验ID: "XK-XN-001"
    冲突条件: "H < 20"
    冲突类型: 读者状态冲突
    严重度: 70
    说明: "读者已不关心，拖延无效"
    建议替代: ["XK-XN-002", "XK-FZ-001"]

  - 经验ID: "XK-XN-002"
    冲突条件: "H < 30 且 无活跃悬念"
    冲突类型: 读者状态冲突
    严重度: 65
    说明: "无悬念可揭"
    建议替代: ["XK-XN-001", "XK-FZ-001"]

  - 经验ID: "XK-GC-001"
    冲突条件: "S < 50 或 T < 50"
    冲突类型: 读者状态冲突
    严重度: 90
    说明: "峰值不足，高潮塌陷"
    建议替代: ["XK-YL-001", "XK-FZ-001"]

  - 经验ID: "XK-GC-001"
    冲突条件: "最近3章已用 XK-GC-001"
    冲突类型: 读者状态冲突
    严重度: 95
    说明: "高潮过频，严重贬值"
    建议替代: ["XK-SP-001", "XK-SJ-001"]

  - 经验ID: "XK-FZ-001"
    冲突条件: "F > 60 且 误解已持续 > 5 章"
    冲突类型: 读者状态冲突
    严重度: 75
    说明: "误解拖太久"
    建议替代: ["XK-XN-002"]

  - 经验ID: "XK-SJ-003"
    冲突条件: "T > 85"
    冲突类型: 读者状态冲突
    严重度: 60
    说明: "紧张峰值时不宜缓冲注水"
    建议替代: ["XK-GC-001", "XK-QX-001"]

# ─────────────────────────────────────────
# 三、模式级冲突
# ─────────────────────────────────────────

模式冲突:

  - 模式A: "XL-001"
    模式B: "压制爆发链"
    冲突类型: 阶段冲突
    严重度: 30
    说明: "可并行，但勿同章启动两条链的高潮步"
    处理: "取权重更高者为主链"

# ─────────────────────────────────────────
# 四、冲突聚合规则
# ─────────────────────────────────────────

聚合规则:
  同章总冲突分: "max(原子对冲突) + sum(读者状态冲突) / 2"
  决策阈值:
    通过: "< 40"
    警告: "40–69，须调序或替换"
    拒绝: ">= 70，不得同章组合"
