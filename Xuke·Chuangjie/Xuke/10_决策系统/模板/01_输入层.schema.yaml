# 决策引擎 · 输入层 Schema
# 版本: "1.1"

类型: 决策输入
版本: "1.1"

必填:
  输入:
    章节上下文:
      章节ID: { 类型: 字符串 }
      章节阶段: { 类型: 枚举, 选项: [起势, 压制, 转折, 高潮, 收束] }
      当前事件: { 类型: 列表 }
      核心冲突: { 类型: 列表 }
      剧情意图: { 类型: 字符串, 说明: "本章叙事目标，非正文" }

    读者状态:
      期待值: { 类型: 整数, 范围: [0, 100] }
      好奇心: { 类型: 整数, 范围: [0, 100] }
      紧张感: { 类型: 整数, 范围: [0, 100] }
      爽感储备: { 类型: 整数, 范围: [0, 100] }
      疲劳值: { 类型: 整数, 范围: [0, 100] }

    历史快照:
      最近模式链: { 类型: 列表 }
      已用经验: { 类型: 列表, 说明: "经验ID，最近5章" }
      失败模式: { 类型: 列表 }
      最近叙事弧: { 类型: 列表 }

可选:
  输入:
    世界状态:
      资源: { 类型: 列表 }
      阵营: { 类型: 列表 }
      力量平衡: { 类型: 列表 }
