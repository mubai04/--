# 决策引擎 · 决策输出层 Schema
# 版本: "1.1"

类型: 决策输出
版本: "1.1"

结构:
  决策输出:
    选定策略:
      主模式链: 字符串
      支撑经验: 列表

    叙事计划:
      压制相: 列表
      触发相: 列表
      爆发相: 列表
      收束相: 列表

    读者曲线预测:
      期待值: 整数
      好奇心: 整数
      紧张感: 整数
      爽感储备: 整数
      疲劳值: 整数

    风险警告:
      等级: 枚举
      选项: [低, 中, 高]
      说明: 列表

    降级策略:
      疲劳过高时: 字符串
      悬念不足时: 字符串
      爽感不足时: 字符串
