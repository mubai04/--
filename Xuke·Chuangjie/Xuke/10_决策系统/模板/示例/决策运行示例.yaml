# 决策运行完整示例
# 场景：第 18 章，对峙阶段，S=78 T=72 F=38，前两章连续压制

协议版本: "1.1"

# ── ① 输入层 ──

输入:
  章节上下文:
    章节ID: "CH-018"
    章节阶段: 高潮
    当前事件:
      - "宗门大比决赛前夜"
      - "对手公开挑衅"
    核心冲突:
      - "焦点角色实力仍被低估"
    剧情意图: "完成蓄力释放，段级高潮"

  读者状态:
    期待值: 72
    好奇心: 48
    紧张感: 72
    爽感储备: 78
    疲劳值: 38

  历史快照:
    最近模式链: ["XL-001"]
    已用经验: ["XK-YL-001", "XK-YL-001", "XK-SJ-001"]
    失败模式: []
    最近叙事弧: ["压制积累弧"]

  世界状态:
    资源: ["隐藏底牌未出"]
    阵营: ["宗门内部两派"]
    力量平衡: ["表面劣势"]

# ── ② 候选层（引擎计算结果） ──

候选:
  经验原子:
    - 经验ID: "XK-GC-001"
      名称: "绝境爆发"
      类别: 高潮
      匹配得分: 92
      读者适配得分: 88
      风险得分: 15

    - 经验ID: "XK-SP-001"
      名称: "权威面前公开翻盘"
      类别: 爽点
      匹配得分: 85
      读者适配得分: 82
      风险得分: 20

    - 经验ID: "XK-XN-002"
      名称: "信息揭晓"
      类别: 悬念
      匹配得分: 45
      读者适配得分: 40
      风险得分: 35

    - 经验ID: "XK-YL-001"
      名称: "压制积累"
      类别: 压力
      匹配得分: 30
      读者适配得分: 15
      风险得分: 75

  模式链:
    - 链ID: "XL-004"
      名称: "压制爆发链"
      步骤: ["XK-YL-001", "XK-SJ-001", "XK-GC-001", "XK-SP-001"]
      预期效果:
        期待值变化: 5
        紧张感变化: -30
        爽感储备变化: -80
        疲劳值变化: -35

# ── ③ 冲突评估层 ──

冲突分析:
  原子冲突:
    - 原子A: "XK-GC-001"
      原子B: "XK-SP-001"
      冲突类型: 爽感冲突
      严重度: 75
      处理: "分章执行或仅取其一"

    - 原子A: "XK-YL-001"
      原子B: "XK-GC-001"
      冲突类型: 读者状态冲突
      严重度: 75
      处理: "拒绝 YL-001"

  读者冲突:
    疲劳风险: 25
    期待崩塌风险: 20
    爽感过载风险: 55

# ── ④ 权重计算层 ──

权重引擎:
  公式输入:
    读者状态权重: 1.45
    章节阶段权重: 1.30
    历史惩罚: 0.70

  计算得分:
    - 目标ID: "XK-GC-001"
      类型: 经验原子
      最终得分: 91
      推理说明: "S=78 T=72 满足绝境爆发；阶段=高潮 ×1.3；YL 已连续2章不再压制"

    - 目标ID: "XK-SP-001"
      类型: 经验原子
      最终得分: 78
      推理说明: "公开翻盘适配；与 GC-001 同章冲突 −15"

    - 目标ID: "XL-004"
      类型: 模式链
      最终得分: 86
      推理说明: "当前处于链步 3（爆发），下一步 GC-001"

    - 目标ID: "XK-YL-001"
      类型: 经验原子
      最终得分: 12
      推理说明: "S>70 熔断禁止继续压制"

# ── ⑤ 决策输出层 ──

决策输出:
  选定策略:
    主模式链: "XL-004"
    支撑经验:
      - "XK-GC-001"
      - "XK-QX-001"
      - "XK-SP-001"

  叙事计划:
    压制相: []
    触发相:
      - "对手挑衅升级 stakes"
    爆发相:
      - "XK-GC-001 绝境爆发（本章主高峰）"
    收束相:
      - "XK-SP-001 公开翻盘（建议下章开篇，避免与 GC 同章双高峰）"

  读者曲线预测:
    期待值: 5
    好奇心: -5
    紧张感: -40
    爽感储备: -65
    疲劳值: -22

  风险警告:
    等级: 中
    说明:
      - "GC-001 与 SP-001 同章组合严重度 75，已拆章"
      - "爽感过载风险 55，下章宜缓冲"

  降级策略:
    疲劳过高时: "XK-SJ-003 挫败反思"
    悬念不足时: "XK-XN-001 悬念拖延"
    爽感不足时: "XK-YL-001 再压制一轮"

# ── ⑥ 快照层（完章后 Chuangjie 回流示例） ──

快照更新:
