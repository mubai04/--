# Snapshot 快照 Schema
# 版本: "1.1"
# 用途: Chuangjie 完章后回流，驱动经验权重迭代

类型: 快照更新
版本: "1.1"

必填:
  快照更新:
    章节ID: { 类型: 字符串 }

    执行策略:
      模式链: { 类型: 字符串 }
      使用经验: { 类型: 列表 }

    结果:
      读者状态变化:
        期待值: { 类型: 整数, 说明: "变化量" }
        好奇心: { 类型: 整数 }
        紧张感: { 类型: 整数 }
        爽感储备: { 类型: 整数 }
        疲劳值: { 类型: 整数 }
      成功得分: { 类型: 整数, 范围: [0, 100] }

    学习信号:
      加权经验: { 类型: 列表, 说明: "下章历史惩罚系数 +0.1" }
      降权经验: { 类型: 列表, 说明: "下章历史惩罚系数 −0.2" }
      新模式候选: { 类型: 列表 }

可选:
  快照更新:
    评估备注: { 类型: 字符串 }
    失败模式ID: { 类型: 列表 }
